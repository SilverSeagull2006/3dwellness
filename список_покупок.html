<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>3dWellness, список покупок</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="desktop.css">
<style>
  :root{
    --bg:#f7f5f0; --card:#ffffff; --soft:#efece5;
    --text:#20242b; --muted:#6f7480; --sub:#9a9ea8;
    --border:rgba(20,24,32,.09); --border-strong:rgba(20,24,32,.16);
    --sage-bg:#e2f0e9; --sage-fg:#2f5d4a;
    --lav-bg:#e8e4f6; --lav-fg:#4a3f7a;
    --peach-bg:#f7e8dc; --peach-fg:#7c4b2b;
    --accent:#7bbfa3;
  }
  @media (prefers-color-scheme:dark){
    :root{--bg:#191b20;--card:#23262d;--soft:#2b2e35;
      --text:#f2f2ee;--muted:#a4a8b2;--sub:#878b95;
      --border:rgba(255,255,255,.10);--border-strong:rgba(255,255,255,.2);--peach-bg:#3a2b21;--peach-fg:#e2b58f;--sage-bg:#1d3a2f;--sage-fg:#84cdac;--lav-bg:#2a2456;--lav-fg:#b7aef0;}
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:'Nunito',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased}
  .wrap{max-width:460px;margin:0 auto;padding:20px 18px 30px}
  .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;flex-wrap:wrap;gap:4px 10px}
  .top a{font-size:13px;color:var(--muted);text-decoration:none}
  h1{font-size:20px;font-weight:600;margin:10px 0 4px}
  .lead{font-size:13.5px;color:var(--muted);line-height:1.5;margin-bottom:16px}
  .card{background:var(--card);border:0.5px solid var(--border);border-radius:16px;padding:6px 14px;margin-bottom:12px}
  .hd{padding:8px 0 4px;font-size:12px;font-weight:600;border-bottom:0.5px solid var(--border)}
  .row{display:flex;align-items:center;gap:11px;padding:10px 0;border-top:0.5px solid var(--border)}
  .row:first-of-type{border-top:none}
  .tick{width:22px;height:22px;border-radius:50%;border:2px solid var(--border-strong);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s}
  .tick svg{width:12px;height:12px;opacity:0;transition:.15s}
  .row.bought .tick{background:var(--accent);border-color:var(--accent)}
  .row.bought .tick svg{opacity:1}
  .lab{flex:1;min-width:0;font-size:14.5px}
  .row.bought .lab{color:var(--sub);text-decoration:line-through}
  .empty{font-size:14px;color:var(--muted);padding:14px 2px}
  .foot{text-align:center;font-size:12.5px;color:var(--sub);padding-top:10px;line-height:1.5}
</style>
</head>
<body>
<nav class="dsidebar">
  <div class="dbrand">3dWellness</div>
  <a href="index.html">✦ мой день</a>
  <a href="карта.html">карта маршрута</a>
  <a href="журнал.html">📖 журнал</a>
  <div class="dgap"></div>
  <a href="опросник.html" class="on">1D · биохимия</a>
  <a href="физика.html">2D · физика</a>
  <a href="психика.html">3D · психика</a>
</nav>

<div class="wrap">
  <div class="top">
    <a href="карта.html" style="flex:1;text-align:center;padding:9px 10px;border-radius:12px;border:1px solid var(--border-strong);font-weight:700;text-decoration:none;color:var(--text)">← карта</a>
    <a href="index.html" style="flex:1;text-align:center;padding:9px 10px;border-radius:12px;border:1px solid var(--border-strong);font-weight:700;text-decoration:none;color:var(--text)">сегодня →</a>
  </div>
  <h1>список покупок</h1>
  <div class="lead">отмечай, что уже купила, остальное подождёт.</div>
  <div id="host"></div>
  <div class="foot">здесь появляется всё, что добавлено в «Мой день» — из опросника или вручную</div>
</div>

<script>
var DIMS=["1D · биохимия","2D · физика","3D · психика"];
var CHECK='<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg>';
function loadPlan(){
  try{ var raw=localStorage.getItem("3dw_plan_v1"); return raw ? JSON.parse(raw) : [[],[],[]]; }catch(e){ return [[],[],[]]; }
}
function loadBought(){
  try{ var raw=localStorage.getItem("3dw_bought"); return raw ? JSON.parse(raw) : {}; }catch(e){ return {}; }
}
function saveBought(b){ try{ localStorage.setItem("3dw_bought", JSON.stringify(b)); }catch(e){} }
function render(){
  var plan=loadPlan(), bought=loadBought();
  var host=document.getElementById("host"); host.innerHTML="";
  var any=false;
  plan.forEach(function(allItems,si){
    var items=allItems.filter(function(it){ return !(it.source && it.source.kind==="dir"); });
    if(!items.length) return;
    any=true;
    var card=document.createElement("div"); card.className="card";
    card.innerHTML='<div class="hd">'+DIMS[si]+'</div>';
    items.forEach(function(it){
      var key=si+"|"+it.t;
      var isBought=!!bought[key];
      var row=document.createElement("div"); row.className="row"+(isBought?" bought":"");
      const meta=[it.form,it.dose].filter(Boolean).join(' · ');
      row.innerHTML='<span class="tick">'+CHECK+'</span><span class="lab">'+it.t
        + (meta?'<span style="display:block;color:var(--sub);font-size:12.5px;font-weight:400;margin-top:1px">'+meta+'</span>':'')
        +'</span>';
      row.addEventListener("click",function(){
        bought[key]=!isBought; saveBought(bought); render();
      });
      card.appendChild(row);
    });
    host.appendChild(card);
  });
  if(!any) host.innerHTML='<div class="empty">пока пусто — добавь дела на экране «сегодня» или пройди опросник</div>';
}
try{ if(window.Telegram && Telegram.WebApp){ Telegram.WebApp.ready(); Telegram.WebApp.expand(); } }catch(e){}
render();
</script>
</body>
</html>
