<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>3dWellness, 2D · физика</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="опросник-данные.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="desktop.css">
<style>
  :root{
    --bg:#faf8f4; --card:#fff;
    --text:#1a1a18; --muted:#75746e;
    --border:rgba(0,0,0,.09); --border-strong:rgba(0,0,0,.18);
    --navy:#3f5d67;
  }
  @media (prefers-color-scheme:dark){
    :root{--bg:#1a1a18;--card:#262523;--text:#f4f3ee;--muted:#a8a69f;--border:rgba(255,255,255,.11);--border-strong:rgba(255,255,255,.22)}
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:'Nunito',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased}
  .wrap{max-width:460px;margin:0 auto;padding:16px 18px 30px}
  .top{display:flex;gap:8px;margin-bottom:14px}
  .navbtn{flex:1;text-align:center;padding:9px 10px;border-radius:12px;font-size:13px;font-weight:700;
    text-decoration:none;border:1px solid var(--border-strong);color:var(--text)}
  h1{font-size:20px;font-weight:700;margin:6px 0 4px}
  .lead{font-size:13.5px;color:var(--muted);line-height:1.5;margin-bottom:20px}

  .path{position:relative;padding-left:46px}
  .line{position:absolute;left:20px;top:22px;bottom:22px;width:0;border-left:2px dashed var(--navy);opacity:.45}
  .step{position:relative;margin-bottom:14px;display:block;text-decoration:none;color:inherit}
  .num{position:absolute;left:-46px;top:2px;width:36px;height:36px;border-radius:50%;
    color:#fff;display:flex;align-items:center;justify-content:center;
    font-size:16px;font-weight:800;z-index:2;box-shadow:0 0 0 4px var(--bg)}
  .card{background:var(--card);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px;
    text-decoration:none;color:inherit;box-shadow:0 1px 2px rgba(0,0,0,.05)}
  .card .ic{font-size:22px;flex-shrink:0}
  .card .tx{display:flex;flex-direction:column;min-width:0}
  .card .t{font-size:14.5px;font-weight:700;line-height:1.25}
  .card .d{font-size:11.5px;color:var(--muted);margin-top:1px}
  .card .chev{margin-left:auto;color:var(--muted);font-size:16px;flex-shrink:0}
  .step.soon .card{opacity:.55;filter:grayscale(.3);pointer-events:none}
  .soontag{font-size:9.5px;font-weight:700;color:var(--muted);background:var(--bg);border:1px solid var(--border);
    border-radius:999px;padding:2px 7px;margin-left:auto;flex-shrink:0}

  .foot{text-align:center;font-size:12.5px;color:var(--muted);padding-top:20px;line-height:1.5}
</style>
</head>
<body>
<nav class="dsidebar">
  <div class="dbrand">3dWellness</div>
  <a href="index.html">✦ мой день</a>
  <a href="карта.html">карта маршрута</a>
  <a href="журнал.html">⚓ бортовой журнал</a>
  <div class="dgap"></div>
  <a href="опросник.html">1D · биохимия</a>
  <a href="физика.html" class="on">2D · физика</a>
  <a href="психика.html">3D · психика</a>
</nav>

<div class="wrap">
  <div class="top">
    <a class="navbtn" href="карта.html">← карта</a>
    <a class="navbtn" href="журнал.html">⚓ бортовой журнал</a>
  </div>
  <h1>2D · тело</h1>
  <div class="lead">от фундамента к нагрузке, шаг за шагом.</div>

  <div class="path" id="stages">
    <div class="line"></div>
  </div>

</div>

<script>
var host=document.getElementById("stages");
TWODIM_MAP.forEach(function(s,i){
  var el=document.createElement(s.built ? "a" : "div");
  el.className="step"+(s.built?"":" soon");
  if(s.built) el.href=s.href;
  el.innerHTML =
    '<span class="num" style="background:'+s.color+'">'+(i+1)+'</span>'+
    '<span class="card">'+
      '<span class="ic">'+s.ic+'</span>'+
      '<span class="tx"><span class="t">'+s.t+'</span><span class="d">'+s.d+'</span></span>'+
      (s.built ? '<span class="chev">›</span>' : '<span class="soontag">скоро</span>')+
    '</span>';
  host.appendChild(el);
});
try{ if(window.Telegram && Telegram.WebApp){ Telegram.WebApp.ready(); Telegram.WebApp.expand(); } }catch(e){}
</script>
</body>
</html>
