<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>3dWellness — карта</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --text:#20242b; --muted:#6f7480;
    --leaf-fg:#2f5d3f;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;background:#5f6b78}
  body{color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased}

  .scene{position:relative;width:100%;min-height:100svh;
    background-image:url(карта_фон.png);background-size:cover;background-position:center;
    display:flex;flex-direction:column}

  .title{position:absolute;top:6%;left:0;right:0;text-align:center;color:#3a3752}
  .title h1{font-size:22px;font-weight:600;margin:0 0 4px;text-shadow:0 1px 8px rgba(255,255,255,.5)}
  .title p{font-size:13px;margin:0;opacity:.85;line-height:1.4;padding:0 14%;text-shadow:0 1px 8px rgba(255,255,255,.5)}

  .leaf{position:absolute;text-decoration:none;text-align:center;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:var(--leaf-fg)}
  .leaf .t{font-size:15px;font-weight:700;line-height:1.15}
  .leaf .d{font-size:10.5px;font-weight:500;opacity:.8;margin-top:2px;line-height:1.25;max-width:120px}

  #leaf1{left:26%;top:67%;width:40%}
  #leaf2{left:44%;top:50.5%;width:34%}
  #leaf3{left:60%;top:39%;width:34%}

  .bottombar{margin-top:auto;position:relative;padding:14px 20px 26px;text-align:center}
  .bottombar .row{display:flex;align-items:center;gap:8px;justify-content:center;font-size:12.5px;color:#e7ecf1;margin-bottom:8px}
  .bottombar button{font-size:12.5px;padding:6px 14px;border-radius:999px;border:0.5px solid rgba(255,255,255,.4);
    background:rgba(255,255,255,.08);color:#e7ecf1;cursor:pointer;font-family:inherit}
  .bottombar button.on{background:rgba(255,255,255,.85);color:#2f5d3f;font-weight:600;border-color:transparent}
</style>
</head>
<body>

<div class="scene">
  <div class="title">
    <h1>3dWellness</h1>
    <p>идём по шагам, за руку. вот дорожка — куда бы ты ни зашла, отсюда видно всё</p>
  </div>

  <a class="leaf" id="leaf1" href="опросник.html">
    <span class="t">опросник</span>
    <span class="d">симптомы → анализы → БАД</span>
  </a>
  <a class="leaf" id="leaf2" href="список_покупок.html">
    <span class="t">список покупок</span>
    <span class="d">всё, что в плане — под рукой</span>
  </a>
  <a class="leaf" id="leaf3" href="index.html">
    <span class="t">сегодня</span>
    <span class="d">твой ежедневный экран</span>
  </a>

  <div class="bottombar">
    <div class="row" id="pinLabel">открывать сразу «сегодня» в следующий раз?</div>
    <button id="pinBtn" onclick="togglePin()">включить</button>
  </div>
</div>

<script>
try{ if(window.Telegram && Telegram.WebApp){ Telegram.WebApp.ready(); Telegram.WebApp.expand(); } }catch(e){}
try{ localStorage.setItem("3dw_map_seen","1"); }catch(e){}
function paintPin(){
  var on=false; try{ on = localStorage.getItem("3dw_pin_today")==="1"; }catch(e){}
  document.getElementById("pinBtn").textContent = on ? "включено ✓" : "включить";
  document.getElementById("pinBtn").classList.toggle("on", on);
}
function togglePin(){
  var on=false; try{ on = localStorage.getItem("3dw_pin_today")==="1"; }catch(e){}
  try{ localStorage.setItem("3dw_pin_today", on ? "0" : "1"); }catch(e){}
  paintPin();
}
paintPin();
</script>
</body>
</html>
